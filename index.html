<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miracle Heart</title>
  <style>
    body { margin: 0; background: #0a0a0a; }
    iframe { width: 100vw; height: 100vh; border: none; display: block; }
    .enter-btn {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      padding: 10px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #ccc;
      font-family: monospace;
      font-size: 13px;
      text-decoration: none;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .enter-btn:hover { border-color: #fac6f7; color: #fac6f7; }
    #fs-hint {
      position: fixed; inset: 0; z-index: 9998;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6);
      color: #ccc; font-family: monospace; font-size: 14px;
      cursor: pointer; letter-spacing: 2px;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <a class="enter-btn" href="particles-playground/test_.html">Enter Heart →</a>
  <div id="fs-hint" onclick="goFullscreen()">✦ 点击进入全屏 ✦</div>
  <iframe src="./particles-playground/dist/"></iframe>
  <script>
    function goFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      document.getElementById('fs-hint').style.opacity = '0';
      setTimeout(() => document.getElementById('fs-hint').remove(), 500);
    }
  </script>
</body>
</html>
